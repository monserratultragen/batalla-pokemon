<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Pokeball body -->
  <circle cx="16" cy="16" r="15" fill="#fff" stroke="#333" stroke-width="1"/>
  
  <!-- Top half (red) -->
  <path d="M16 1 A15 15 0 0 1 31 16 L1 16 A15 15 0 0 1 16 1 Z" fill="#FF0000"/>
  
  <!-- Middle line -->
  <rect x="1" y="15" width="30" height="2" fill="#333"/>
  
  <!-- Center button outer -->
  <circle cx="16" cy="16" r="5" fill="#333"/>
  
  <!-- Center button inner -->
  <circle cx="16" cy="16" r="3" fill="#fff"/>
  
  <!-- Shine -->
  <ellipse cx="10" cy="8" rx="3" ry="2" fill="rgba(255,255,255,0.4)" transform="rotate(-30 10 8)"/>
</svg>
